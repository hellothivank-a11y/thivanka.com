<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis — Private Space</title>
    <!-- Supabase CDN Latest -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.48.0/dist/umd/supabase.js"></script>
    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        :root {
            --bg-main: #080c14;
            --panel-bg: rgba(15, 23, 42, 0.85);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-cyan: #38bdf8;
            --accent-rose: #f43f5e;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body {
            background: var(--bg-main);
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(56, 189, 248, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(244, 63, 94, 0.06) 0%, transparent 40%);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .app-container {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            overflow: hidden;
            position: relative;
        }

        /* --- VIDEO SECTION --- */
        .video-section {
            position: relative;
            width: 100%;
            background: #020617;
            border-bottom: 1px solid var(--border-color);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Mobile mode (Full Phone Height Ratio) */
        .video-section.mode-mobile {
            height: 600px;
        }

        /* Desktop mode (Landscape) */
        .video-section.mode-desktop {
            height: 280px;
        }

        .video-box-partner {
            width: 100%;
            height: 100%;
            position: relative;
            background: #080c14;
        }

        .video-box-partner video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-box-self {
            position: absolute;
            bottom: 14px;
            right: 14px;
            width: 110px;
            height: 160px;
            background: #0f172a;
            border-radius: 14px;
            overflow: hidden;
            border: 2px solid rgba(56, 189, 248, 0.5);
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            z-index: 10;
        }

        .video-box-self video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .video-label {
            position: absolute;
            bottom: 6px;
            left: 8px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            color: var(--text-primary);
            font-size: 0.62rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .ratio-toggle-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            z-index: 12;
            transition: all 0.2s;
        }

        .ratio-toggle-btn:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        /* --- ACTION BAR & HEADER --- */
        .call-actions-bar {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(2, 6, 23, 0.7);
            border-bottom: 1px solid var(--border-color);
        }

        .btn-action {
            flex: 1;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .btn-action:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .btn-call-active {
            border-color: rgba(56, 189, 248, 0.4);
            background: rgba(56, 189, 248, 0.15);
        }

        .header {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(15, 23, 42, 0.5);
        }

        .brand-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-title h2 {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #475569;
            border-radius: 50%;
            transition: all 0.5s ease;
        }

        .status-dot.online-cyan {
            background: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        .status-dot.online-rose {
            background: var(--accent-rose);
            box-shadow: 0 0 10px var(--accent-rose);
        }

        /* Inputs row including delete icon button */
        .inputs-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        input, select {
            background: rgba(2, 6, 23, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            outline: none;
            width: 100%;
        }

        .clear-icon-btn {
            background: rgba(244, 63, 94, 0.15);
            border: 1px solid rgba(244, 63, 94, 0.3);
            color: var(--accent-rose);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clear-icon-btn:hover {
            background: rgba(244, 63, 94, 0.3);
            border-color: var(--accent-rose);
        }

        .peer-id-badge {
            font-size: 0.65rem;
            color: var(--accent-cyan);
            font-family: monospace;
        }

        /* --- CHAT MESSAGES --- */
        .messages-container {
            height: 220px;
            padding: 12px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .messages-container::-webkit-scrollbar { width: 4px; }
        .messages-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .msg-bubble {
            max-width: 82%;
            padding: 9px 12px;
            border-radius: 14px;
            font-size: 0.85rem;
            line-height: 1.4;
            position: relative;
            word-break: break-word;
        }

        .msg-bubble.sent {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.2) 0%, rgba(14, 165, 233, 0.08) 100%);
            border: 1px solid rgba(56, 189, 248, 0.3);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-bubble.received {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .sender-tag {
            font-size: 0.6rem;
            color: var(--text-secondary);
            margin-bottom: 2px;
            font-weight: 600;
        }

        .msg-time {
            font-size: 0.58rem;
            color: var(--text-secondary);
            text-align: right;
            margin-top: 2px;
        }

        .msg-bubble a { color: var(--accent-cyan); word-break: break-all; }

        .footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            background: rgba(8, 12, 20, 0.7);
        }

        .send-btn {
            background: var(--text-primary);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- VIDEO SECTION (Tall Mobile Ratio) -->
    <div class="video-section mode-mobile" id="videoSection">
        <button class="ratio-toggle-btn" id="ratioBtn" onclick="toggleRatio()">📱 Mobile Ratio</button>
        
        <div class="video-box-partner">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="video-label">Partner</div>
        </div>
        
        <div class="video-box-self">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="video-label">You</div>
        </div>
    </div>

    <!-- CALL ACTIONS BAR -->
    <div class="call-actions-bar">
        <button class="btn-action" onclick="copyMyId()">📋 Copy My ID</button>
        <button class="btn-action btn-call-active" onclick="startCall()">📞 Call Partner</button>
    </div>

    <!-- HEADER & CONTROLS -->
    <div class="header">
        <div class="brand-title">
            <h2>OASIS SPACE</h2>
            <div class="header-right">
                <div class="status-dot" id="statusDot" title="Partner Status"></div>
            </div>
        </div>
        
        <!-- Inputs Row with Direct Delete Icon Button -->
        <div class="inputs-row">
            <select id="username" onchange="onUserChange()">
                <option value="Hani">Hani</option>
                <option value="Bani">Bani</option>
            </select>
            <input type="password" id="secretKey" placeholder="Encryption Key" value="1234">
            <button class="clear-icon-btn" onclick="clearAllMessages()" title="Clear All Messages">🗑️</button>
        </div>
        <div class="peer-id-badge" id="myPeerId">Initializing peer connection...</div>
    </div>
    
    <!-- MESSAGES -->
    <div class="messages-container" id="messageList"></div>

    <!-- FOOTER -->
    <div class="footer">
        <input type="text" id="messageInput" placeholder="Type a message or share a link..." onkeypress="if(event.key==='Enter') sendMessage(event)">
        <button class="send-btn" onmousedown="event.preventDefault(); sendMessage(event);" onclick="sendMessage(event)">SEND</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://hfkwgumcdgpsqjjwtxik.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Jtj7u2jXgqQt1oIC3P-pTg_nsF_foAQ';
    
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let peer, localStream, currentMyId = '';
    let heartbeatInterval;

    function toggleRatio() {
        const videoSection = document.getElementById('videoSection');
        const ratioBtn = document.getElementById('ratioBtn');

        if (videoSection.classList.contains('mode-mobile')) {
            videoSection.classList.remove('mode-mobile');
            videoSection.classList.add('mode-desktop');
            ratioBtn.innerText = "💻 Desktop Ratio";
        } else {
            videoSection.classList.remove('mode-desktop');
            videoSection.classList.add('mode-mobile');
            ratioBtn.innerText = "📱 Mobile Ratio";
        }
    }

    function initPeer() {
        peer = new Peer();
        
        peer.on('open', id => {
            currentMyId = id;
            document.getElementById('myPeerId').innerText = "YOUR ID: " + id;
        });

        peer.on('call', call => {
            navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
                localStream = stream;
                const localVideo = document.getElementById('localVideo');
                localVideo.srcObject = stream;
                localVideo.play();

                call.answer(stream);

                call.on('stream', remoteStream => {
                    const remoteVideo = document.getElementById('remoteVideo');
                    remoteVideo.srcObject = remoteStream;
                    remoteVideo.play();
                });
            }).catch(err => alert("Camera permission issue: " + err));
        });
    }

    function copyMyId() {
        if (!currentMyId) {
            alert("Connection still initializing. Please wait a second!");
            return;
        }
        navigator.clipboard.writeText(currentMyId);
        alert("Your ID copied to clipboard! Send this to your partner.");
    }

    function startCall() {
        const remotePeerId = prompt("Paste Partner's ID here:");
        if (!remotePeerId) return;

        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            localStream = stream;
            const localVideo = document.getElementById('localVideo');
            localVideo.srcObject = stream;
            localVideo.play();

            const call = peer.call(remotePeerId, stream);

            call.on('stream', remoteStream => {
                const remoteVideo = document.getElementById('remoteVideo');
                remoteVideo.srcObject = remoteStream;
                remoteVideo.play();
            });
        }).catch(err => alert("Camera / Microphone permission denied."));
    }

    function encryptText(text, key) {
        return CryptoJS.AES.encrypt(text, key).toString();
    }

    function decryptText(ciphertext, key) {
        try {
            const bytes = CryptoJS.AES.decrypt(ciphertext, key);
            const originalText = bytes.toString(CryptoJS.enc.Utf8);
            return originalText ? originalText : "•••••••• (Invalid Key)";
        } catch (e) {
            return "••••••••";
        }
    }

    function linkify(inputText) {
        let replacedText, replacePattern1, replacePattern2;

        replacePattern1 = /(\b(https?|ftp):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/gim;
        replacedText = inputText.replace(replacePattern1, '<a href="$1" target="_blank">$1</a>');

        replacePattern2 = /(^|[^\/])(www\.[\S]+(\b|$))/gim;
        replacedText = replacedText.replace(replacePattern2, '$1<a href="http://$2" target="_blank">$2</a>');

        return replacedText;
    }

    async function sendMessage(e) {
        if (e) e.preventDefault();
        
        const username = document.getElementById('username').value;
        const secretKey = document.getElementById('secretKey').value;
        const msgInput = document.getElementById('messageInput');
        const text = msgInput.value.trim();

        if (!secretKey) {
            alert('Set an Encryption Key first.');
            return;
        }
        if (!text) return;

        const encryptedMsg = encryptText(text, secretKey);
        
        msgInput.value = '';
        msgInput.focus();

        const { error } = await supabaseClient
            .from('chat_messages')
            .insert([{ sender: username, encrypted_message: encryptedMsg }]);

        if (error) {
            alert("Error: " + error.message);
        }
    }

    async function clearAllMessages() {
        if (confirm("සියලුම මැසේජ් මකා දැමීමට අවශ්‍යද?")) {
            const { error } = await supabaseClient
                .from('chat_messages')
                .delete()
                .neq('id', 0);

            if (error) {
                alert("Error: " + error.message);
            } else {
                document.getElementById('messageList').innerHTML = '';
            }
        }
    }

    function renderMessage(data) {
        const secretKey = document.getElementById('secretKey').value;
        const currentUsername = document.getElementById('username').value;
        const messageList = document.getElementById('messageList');

        let decrypted = "••••••••";
        if(secretKey) {
            decrypted = decryptText(data.encrypted_message, secretKey);
        }

        const formattedText = linkify(decrypted);

        let timeString = "";
        if (data.created_at) {
            const date = new Date(data.created_at);
            timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        const msgDiv = document.createElement('div');
        const isSelf = data.sender === currentUsername;
        msgDiv.className = `msg-bubble ${isSelf ? 'sent' : 'received'}`;
        
        msgDiv.innerHTML = `
            <div class="sender-tag">${data.sender}</div>
            <div>${formattedText}</div>
            <div class="msg-time">${timeString}</div>
        `;

        messageList.appendChild(msgDiv);
        messageList.scrollTop = messageList.scrollHeight;
    }

    async function loadInitialMessages() {
        document.getElementById('messageList').innerHTML = '';
        const { data } = await supabaseClient
            .from('chat_messages')
            .select('*')
            .order('created_at', { ascending: true })
            .limit(60);
            
        if (data) data.forEach(renderMessage);
    }

    async function updateMyStatus() {
        const username = document.getElementById('username').value;
        await supabaseClient
            .from('online_status')
            .upsert({ username: username, last_seen: new Date().toISOString() });
    }

    async function checkPartnerStatus() {
        const currentUsername = document.getElementById('username').value;
        const partnerUsername = currentUsername === 'Hani' ? 'Bani' : 'Hani';

        const { data } = await supabaseClient
            .from('online_status')
            .select('last_seen')
            .eq('username', partnerUsername)
            .single();

        const statusDot = document.getElementById('statusDot');
        statusDot.className = 'status-dot';

        if (data && data.last_seen) {
            const lastSeenTime = new Date(data.last_seen).getTime();
            const now = new Date().getTime();
            if ((now - lastSeenTime) < 15000) {
                if (currentUsername === 'Hani') {
                    statusDot.classList.add('online-rose');
                } else {
                    statusDot.classList.add('online-cyan');
                }
            }
        }
    }

    function setupStatusTracking() {
        updateMyStatus();
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        
        heartbeatInterval = setInterval(() => {
            updateMyStatus();
            checkPartnerStatus();
        }, 5000);

        checkPartnerStatus();
    }

    function onUserChange() {
        loadInitialMessages();
        setupStatusTracking();
    }

    supabaseClient.channel('public:chat_messages')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, payload => {
            renderMessage(payload.new);
        }).subscribe();

    document.getElementById('secretKey').addEventListener('input', loadInitialMessages);

    loadInitialMessages();
    setupStatusTracking();
    initPeer();
</script>

</body>
</html>
