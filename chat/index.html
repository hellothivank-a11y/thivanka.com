                <input type="file" id="imageFileInput" accept="image/*" style="display: none;" onchange="handleImageFileSelect(event)">
                
                <!-- Text input -->
                <input type="text" id="messageInput" class="chat-input" placeholder="Whisper something sweet..." onkeypress="handleInputKeyPress(event)" oninput="handleInputTyping()">
                
                <!-- Send button inside container -->
                <button class="send-circle-btn" onclick="sendMessage()" title="Send Message">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>
    </div>
    <!-- INCOMING CALL RING OVERLAY -->
    <div class="call-modal" id="incomingCallModal">
        <div class="caller-avatar" id="callerAvatar"></div>
        <div class="caller-name" id="callerNameLabel">Partner</div>
        <div class="call-status-label" id="callStatusLabel">Calling securely...</div>
        <div class="call-actions-row">
            <button class="call-action-circle decline" onclick="declineCall()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/></svg>
            </button>
            <button class="call-action-circle accept" onclick="acceptCall()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </button>
        </div>
    </div>
    <!-- TOAST NOTIFICATION -->
    <div class="toast-msg" id="toastMessage">Toast content</div>
    <!-- IMAGE LIGHTBOX MODAL -->
    <div class="img-modal" id="imageModal" onclick="closeImageModal()">
        <span class="img-modal-close" onclick="closeImageModal()">&times;</span>
        <img class="img-modal-content" id="imageModalTarget" src="" alt="Zoomed view">
    </div>
    <!-- JS Application Scripts -->
    <script src="app.js"></script>
</body>
</html>
