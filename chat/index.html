<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oasis — Private Couple Space</title>
    <!-- Supabase CDN Latest -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.48.0/dist/umd/supabase.js"></script>
    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #030712;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent-cyan: #38bdf8;
            --accent-rose: #f43f5e;
            --glow-color: transparent;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; }
        
        body {
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            overflow: hidden;
        }

        .app-container {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            width: 100%;
            max-width: 480px;
            height: 90vh;
            max-height: 850px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.85), 0 0 50px var(--glow-color);
            overflow: hidden;
            transition: box-shadow 0.8s ease;
        }

        /* --- IMMERSIVE VIDEO CANVAS --- */
        .video-canvas {
            position: relative;
            flex: 1;
            width: 100%;
            background: #000;
            overflow: hidden;
            border-bottom: 1px solid var(--glass-border);
        }

        .partner-view {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .partner-view video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Draggable PIP Self View with Touch Safety */
        .self-view {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 110px;
            height: 160px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            overflow: hidden;
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
            z-index: 20;
            cursor: grab;
            touch-action: none;
            transition: transform 0.2s ease;
        }

        .self-view:active { cursor: grabbing; transform: scale(1.03); }

        .self-view video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .video-floating-actions {
            position: absolute;
            bottom: 16px;
            left: 16px;
            display: flex;
            gap: 8px;
            z-index: 15;
        }

        .glass-btn {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* --- CONTROL HEADER --- */
        .app-header {
            padding: 12px 18px;
            background: rgba(3, 7, 18, 0.7);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .brand-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-bar h2 {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #475569;
            border-radius: 50%;
            transition: all 0.5s ease;
        }

        .status-dot.online-cyan {
            background: var(--accent-cyan);
            box-shadow: 0 0 12px var(--accent-cyan);
        }

        .status-dot.online-rose {
            background: var(--accent-rose);
            box-shadow: 0 0 12px var(--accent-rose);
        }

        .menu-dots {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 4px;
        }

        .dropdown-menu {
            position: absolute;
            right: 18px;
            top: 45px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            width: 160px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            z-index: 100;
            overflow: hidden;
        }

        .dropdown-menu.show { display: flex; }

        .dropdown-item {
            background: none;
            border: none;
            color: var(--accent-rose);
            padding: 10px 14px;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .dropdown-item:hover { background: rgba(244, 63, 94, 0.15); }

        .inputs-bar {
            display: flex;
            gap: 8px;
        }

        input, select {
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            outline: none;
            width: 100%;
        }

        .peer-info {
            font-size: 0.65rem;
            color: var(--accent-cyan);
            font-family: monospace;
            letter-spacing: 0.5px;
        }

        /* --- SPATIAL CHAT --- */
        .chat-container {
            height: 200px;
            padding: 12px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(3, 7, 18, 0.5);
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }

        .msg-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.85rem;
            line-height: 1.45;
            position: relative;
            word-break: break-word;
            animation: floatUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg-bubble.sent {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.25) 0%, rgba(14, 165, 233, 0.1) 100%);
            border: 1px solid rgba(56, 189, 248, 0.3);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-bubble.received {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--glass-border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .sender-tag {
            font-size: 0.6rem;
            color: var(--text-sub);
            margin-bottom: 2px;
            font-weight: 600;
        }

        .msg-time {
            font-size: 0.58rem;
            color: var(--text-sub);
            text-align: right;
            margin-top: 3px;
        }

        .msg-bubble a { color: var(--accent-cyan); text-decoration: underline; word-break: break-all; }

        .chat-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 8px;
            background: rgba(3, 7, 18, 0.9);
        }

        .send-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 8px 18px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .send-btn:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="app-container" id="appContainer">
    <div class="video-canvas" id="videoCanvas">
        <div class="partner-view">
            <video id="remoteVideo" autoplay playsinline></video>
        </div>

        <div class="self-view" id="selfView">
            <video id="localVideo" autoplay muted playsinline></video>
        </div>

        <div class="video-floating-actions">
            <button class="glass-btn" onclick="copyMyId()">📋 Copy ID</button>
            <button class="glass-btn" onclick="startCall()">📞 Call Partner</button>
            <button class="glass-btn" onclick="toggleFullScreen()">⛶ Fullscreen</button>
        </div>
    </div>

    <div class="app-header">
        <div class="brand-bar">
            <h2>OASIS SPACE</h2>
            <div class="status-badge">
                <div class="status-dot" id="statusDot" title="Partner Status"></div>
                <button class="menu-dots" onclick="toggleMenu(event)">⋮</button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <button class="dropdown-item" onclick="clearAllMessages()">🗑️ Clear Messages</button>
                </div>
            </div>
        </div>

        <div class="inputs-bar">
            <select id="username" onchange="onUserChange()">
                <option value="Hani">Hani</option>
                <option value="Bani">Bani</option>
            </select>
            <input type="password" id="secretKey" placeholder="Encryption Key" value="1234">
        </div>
        <div class="peer-info" id="myPeerId">Initializing secure space...</div>
    </div>

    <div class="chat-container" id="messageList"></div>

    <div class="chat-footer">
        <input type="text" id="messageInput" placeholder="Whisper something sweet..." onkeypress="if(event.key==='Enter') sendMessage(event)">
        <button class="send-btn" onmousedown="event.preventDefault(); sendMessage(event);" onclick="sendMessage(event)">SEND</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://hfkwgumcdgpsqjjwtxik.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Jtj7u2jXgqQt1oIC3P-pTg_nsF_foAQ';
    
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let peer, localStream, currentMyId = '';
    let heartbeatInterval;
    let activeChannel = null;

    // Zero Footprint Clean-up
    window.addEventListener('beforeunload', () => {
        localStorage.removeItem('oasis_temp_session');
        sessionStorage.clear();
    });

    // Safe Boundary Draggable PIP
    const selfView = document.getElementById("selfView");
    const videoCanvas = document.getElementById("videoCanvas");
    let isDragging = false, offsetStartX, offsetStartY, initialLeft, initialTop;

    selfView.addEventListener("mousedown", startDrag);
    selfView.addEventListener("touchstart", startDrag, { passive: false });

    function startDrag(e) {
        isDragging = true;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        offsetStartX = clientX;
        offsetStartY = clientY;
        
        const rect = selfView.getBoundingClientRect();
        const parentRect = videoCanvas.getBoundingClientRect();
        
        initialLeft = rect.left - parentRect.left;
        initialTop = rect.top - parentRect.top;

        document.addEventListener("mousemove", onDrag);
        document.addEventListener("touchmove", onDrag, { passive: false });
        document.addEventListener("mouseup", stopDrag);
        document.addEventListener("touchend", stopDrag);
    }

    function onDrag(e) {
        if (!isDragging) return;
        if (e.cancelable) e.preventDefault();
        
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const deltaX = clientX - offsetStartX;
        const deltaY = clientY - offsetStartY;

        const parentRect = videoCanvas.getBoundingClientRect();
        const rect = selfView.getBoundingClientRect();

        let newLeft = initialLeft + deltaX;
        let newTop = initialTop + deltaY;

        // Strict Boundary Clamp
        newLeft = Math.max(8, Math.min(newLeft, parentRect.width - rect.width - 8));
        newTop = Math.max(8, Math.min(newTop, parentRect.height - rect.height - 8));

        selfView.style.left = `${newLeft}px`;
        selfView.style.top = `${newTop}px`;
        selfView.style.right = 'auto';
    }

    function stopDrag() {
        isDragging = false;
        document.removeEventListener("mousemove", onDrag);
        document.removeEventListener("touchmove", onDrag);
    }

    function toggleMenu(e) {
        e.stopPropagation();
        document.getElementById('dropdownMenu').classList.toggle('show');
    }

    window.addEventListener('click', () => {
        const menu = document.getElementById('dropdownMenu');
        if (menu.classList.contains('show')) menu.classList.remove('show');
    });

    function toggleFullScreen() {
        const elem = document.getElementById('videoCanvas');
        if (!document.fullscreenElement) {
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }

    function initPeer() {
        peer = new Peer();
        
        peer.on('open', id => {
            currentMyId = id;
            document.getElementById('myPeerId').innerText = "SECURE ID: " + id;
        });

        peer.on('call', call => {
            navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
                localStream = stream;
                const localVideo = document.getElementById('localVideo');
                localVideo.srcObject = stream;
                localVideo.play();

                call.answer(stream);

                call.on('stream', remoteStream => {
                    const remoteVideo = document.getElementById('remoteVideo');
                    remoteVideo.srcObject = remoteStream;
                    remoteVideo.play();
                });
            }).catch(err => alert("Camera permission issue: " + err));
        });
    }

    function copyMyId() {
        if (!currentMyId) {
            alert("Connection still initializing...");
            return;
        }
        navigator.clipboard.writeText(currentMyId);
        alert("Secure ID copied!");
    }

    function startCall() {
        const remotePeerId = prompt("Enter Partner's Secure ID:");
        if (!remotePeerId) return;

        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            localStream = stream;
            const localVideo = document.getElementById('localVideo');
            localVideo.srcObject = stream;
            localVideo.play();

            const call = peer.call(remotePeerId, stream);

            call.on('stream', remoteStream => {
                const remoteVideo = document.getElementById('remoteVideo');
                remoteVideo.srcObject = remoteStream;
                remoteVideo.play();
            });
        }).catch(err => alert("Camera denied."));
    }

    function encryptText(text, key) {
        return CryptoJS.AES.encrypt(text, key).toString();
    }

    function decryptText(ciphertext, key) {
        try {
            const bytes = CryptoJS.AES.decrypt(ciphertext, key);
            const originalText = bytes.toString(CryptoJS.enc.Utf8);
            return originalText ? originalText : "•••••••• (Invalid Key)";
        } catch (e) {
            return "••••••••";
        }
    }

    function linkify(inputText) {
        let replacedText, replacePattern1, replacePattern2;
        replacePattern1 = /(\b(https?|ftp):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/gim;
        replacedText = inputText.replace(replacePattern1, '<a href="$1" target="_blank">$1</a>');
        replacePattern2 = /(^|[^\/])(www\.[\S]+(\b|$))/gim;
        replacedText = replacedText.replace(replacePattern2, '$1<a href="http://$2" target="_blank">$2</a>');
        return replacedText;
    }

    async function sendMessage(e) {
        if (e) e.preventDefault();
        
        const username = document.getElementById('username').value;
        const secretKey = document.getElementById('secretKey').value;
        const msgInput = document.getElementById('messageInput');
        const text = msgInput.value.trim();

        if (!secretKey) {
            alert('Set an Encryption Key first.');
            return;
        }
        if (!text) return;

        const encryptedMsg = encryptText(text, secretKey);
        msgInput.value = '';
        msgInput.focus();

        const { error } = await supabaseClient
            .from('chat_messages')
            .insert([{ sender: username, encrypted_message: encryptedMsg }]);

        if (error) alert("Error: " + error.message);
    }

    async function clearAllMessages() {
        if (confirm("සියලුම මැසේජ් මකා දැමීමට අවශ්‍යද?")) {
            const { error } = await supabaseClient.from('chat_messages').delete().neq('id', 0);
            if (error) alert("Error: " + error.message);
            else document.getElementById('messageList').innerHTML = '';
        }
    }

    function renderMessage(data) {
        const secretKey = document.getElementById('secretKey').value;
        const currentUsername = document.getElementById('username').value;
        const messageList = document.getElementById('messageList');

        let decrypted = "••••••••";
        if(secretKey) decrypted = decryptText(data.encrypted_message, secretKey);

        const formattedText = linkify(decrypted);

        let timeString = "";
        const rawTime = data.created_at || new Date().toISOString();
        const date = new Date(rawTime);
        timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        const msgDiv = document.createElement('div');
        const isSelf = data.sender === currentUsername;
        msgDiv.className = `msg-bubble ${isSelf ? 'sent' : 'received'}`;
        
        msgDiv.innerHTML = `
            <div class="sender-tag">${data.sender}</div>
            <div>${formattedText}</div>
            <div class="msg-time">${timeString}</div>
        `;

        messageList.appendChild(msgDiv);
        messageList.scrollTop = messageList.scrollHeight;
    }

    async function loadInitialMessages() {
        document.getElementById('messageList').innerHTML = '';
        const { data } = await supabaseClient.from('chat_messages').select('*').order('created_at', { ascending: true }).limit(60);
        if (data) data.forEach(renderMessage);
    }

    async function updateMyStatus() {
        const username = document.getElementById('username').value;
        await supabaseClient.from('online_status').upsert({ username: username, last_seen: new Date().toISOString() });
    }

    async function checkPartnerStatus() {
        const currentUsername = document.getElementById('username').value;
        const partnerUsername = currentUsername === 'Hani' ? 'Bani' : 'Hani';

        const { data } = await supabaseClient
            .from('online_status')
            .select('last_seen')
            .eq('username', partnerUsername)
            .single();

        const statusDot = document.getElementById('statusDot');
        const appContainer = document.getElementById('appContainer');
        
        statusDot.className = 'status-dot';
        appContainer.style.setProperty('--glow-color', 'transparent');

        if (data && data.last_seen) {
            const lastSeenTime = new Date(data.last_seen).getTime();
            const now = new Date().getTime();
            
            if ((now - lastSeenTime) < 15000) {
                if (currentUsername === 'Hani') {
                    statusDot.classList.add('online-cyan');
                    appContainer.style.setProperty('--glow-color', 'rgba(56, 189, 248, 0.25)');
                } else if (currentUsername === 'Bani') {
                    statusDot.classList.add('online-rose');
                    appContainer.style.setProperty('--glow-color', 'rgba(244, 63, 94, 0.25)');
                }
            }
        }
    }

    function setupStatusTracking() {
        updateMyStatus();
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(() => {
            updateMyStatus();
            checkPartnerStatus();
        }, 5000);
        checkPartnerStatus();
    }

    function subscribeRealtime() {
        if (activeChannel) supabaseClient.removeChannel(activeChannel);

        activeChannel = supabaseClient.channel('public:chat_messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, payload => {
                renderMessage(payload.new);
            }).subscribe();
    }

    function onUserChange() {
        loadInitialMessages();
        setupStatusTracking();
        subscribeRealtime();
    }

    document.getElementById('secretKey').addEventListener('input', loadInitialMessages);

    loadInitialMessages();
    setupStatusTracking();
    subscribeRealtime();
    initPeer();
</script>

</body>
</html>
