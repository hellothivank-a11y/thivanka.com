<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis — Private Space</title>
    <!-- Supabase CDN Latest -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.48.0/dist/umd/supabase.js"></script>
    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        :root {
            --bg-main: #080c14;
            --panel-bg: rgba(15, 23, 42, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-cyan: #38bdf8;
            --accent-rose: #f43f5e;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body {
            background: var(--bg-main);
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(56, 189, 248, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(244, 63, 94, 0.05) 0%, transparent 40%);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .app-container {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            max-width: 460px;
            height: 780px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            overflow: hidden;
            position: relative;
        }

        .video-wrapper {
            position: relative;
            height: 200px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            padding: 8px;
        }

        video {
            width: 50%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
            background: #020617;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .call-actions {
            position: absolute;
            bottom: 14px;
            right: 14px;
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-icon:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        .header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .brand-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-title h2 {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        .inputs-row {
            display: flex;
            gap: 10px;
        }

        input, select {
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.8rem;
            outline: none;
            transition: all 0.3s ease;
            width: 100%;
        }

        select option {
            background: #0f172a;
            color: #fff;
        }

        input:focus, select:focus {
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.1);
        }

        .peer-id-badge {
            font-size: 0.68rem;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .messages-container::-webkit-scrollbar { width: 4px; }
        .messages-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .msg-bubble {
            max-width: 78%;
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 0.85rem;
            line-height: 1.5;
            position: relative;
            word-break: break-word;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-bubble.sent {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.15) 0%, rgba(14, 165, 233, 0.05) 100%);
            border: 1px solid rgba(56, 189, 248, 0.2);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-bubble.received {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .sender-tag {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .footer {
            padding: 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            background: rgba(8, 12, 20, 0.4);
        }

        .send-btn {
            background: var(--text-primary);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="video-wrapper">
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
        <div class="call-actions">
            <button class="btn-icon" onclick="startCall()">CONNECT VIDEO</button>
        </div>
    </div>

    <div class="header">
        <div class="brand-title">
            <h2>OASIS SPACE</h2>
            <div class="status-dot"></div>
        </div>
        
        <div class="inputs-row">
            <!-- Dropdown for Hani & Bani -->
            <select id="username" onchange="loadInitialMessages()">
                <option value="Hani">Hani</option>
                <option value="Bani">Bani</option>
            </select>
            <input type="password" id="secretKey" placeholder="Encryption Key" value="1234">
        </div>
        <div class="peer-id-badge" id="myPeerId">Initializing peer mesh...</div>
    </div>
    
    <div class="messages-container" id="messageList"></div>

    <div class="footer">
        <input type="text" id="messageInput" placeholder="Type an encrypted message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()">SEND</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://hfkwgumcdgpsqjjwtxik.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Jtj7u2jXgqQt1oIC3P-pTg_nsF_foAQ';
    
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let peer, localStream;

    function initPeer() {
        peer = new Peer();
        peer.on('open', id => {
            document.getElementById('myPeerId').innerText = "PEER ID: " + id;
        });

        peer.on('call', call => {
            navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
                localStream = stream;
                document.getElementById('localVideo').srcObject = stream;
                call.answer(stream);
                call.on('stream', remoteStream => {
                    document.getElementById('remoteVideo').srcObject = remoteStream;
                });
            });
        });
    }

    function startCall() {
        const remotePeerId = prompt("Enter Partner's Peer ID:");
        if (!remotePeerId) return;

        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            localStream = stream;
            document.getElementById('localVideo').srcObject = stream;
            const call = peer.call(remotePeerId, stream);
            call.on('stream', remoteStream => {
                document.getElementById('remoteVideo').srcObject = remoteStream;
            });
        }).catch(() => alert("Camera / Microphone permission denied."));
    }

    function encryptText(text, key) {
        return CryptoJS.AES.encrypt(text, key).toString();
    }

    function decryptText(ciphertext, key) {
        try {
            const bytes = CryptoJS.AES.decrypt(ciphertext, key);
            const originalText = bytes.toString(CryptoJS.enc.Utf8);
            return originalText ? originalText : "•••••••• (Invalid Key)";
        } catch (e) {
            return "••••••••";
        }
    }

    async function sendMessage() {
        const username = document.getElementById('username').value;
        const secretKey = document.getElementById('secretKey').value;
        const msgInput = document.getElementById('messageInput');
        const text = msgInput.value.trim();

        if (!secretKey) {
            alert('Set an Encryption Key first.');
            return;
        }
        if (!text) return;

        const encryptedMsg = encryptText(text, secretKey);
        
        const { error } = await supabaseClient
            .from('chat_messages')
            .insert([{ sender: username, encrypted_message: encryptedMsg }]);

        if (error) {
            alert("Error: " + error.message);
        } else {
            msgInput.value = '';
        }
    }

    function renderMessage(data) {
        const secretKey = document.getElementById('secretKey').value;
        const currentUsername = document.getElementById('username').value;
        const messageList = document.getElementById('messageList');

        let decrypted = "••••••••";
        if(secretKey) {
            decrypted = decryptText(data.encrypted_message, secretKey);
        }

        const msgDiv = document.createElement('div');
        const isSelf = data.sender === currentUsername;
        msgDiv.className = `msg-bubble ${isSelf ? 'sent' : 'received'}`;
        
        msgDiv.innerHTML = `
            <div class="sender-tag">${data.sender}</div>
            <div>${decrypted}</div>
        `;

        messageList.appendChild(msgDiv);
        messageList.scrollTop = messageList.scrollHeight;
    }

    async function loadInitialMessages() {
        document.getElementById('messageList').innerHTML = '';
        const { data } = await supabaseClient.from('chat_messages').select('*').order('created_at', { ascending: true }).limit(60);
        if (data) data.forEach(renderMessage);
    }

    supabaseClient.channel('public:chat_messages')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, payload => {
            renderMessage(payload.new);
        }).subscribe();

    document.getElementById('secretKey').addEventListener('input', loadInitialMessages);

    loadInitialMessages();
    initPeer();
</script>

</body>
</html>
